global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: seasonal-app
    static_configs:
      - targets: ["synthetic-traffic:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: app
    static_configs:
      - targets: ["app:8080"]
